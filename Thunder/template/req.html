<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ file_name }} | Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://vjs.zencdn.net/8.17.4/video-js.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/videojs-ima@2.4.0/dist/videojs.ima.css" rel="stylesheet" />

  <style>
    body { background:#070b17; color:#e7ecff; }
    .video-container { max-width: 960px; margin: 20px auto; aspect-ratio: 16/9; }
    .video-js { width: 100% !important; height: 100% !important; }
    .meta { color:#9fb0da; }
  </style>
</head>
<body>
  <div class="container py-4">
    <h4 class="text-center mb-2">{{ file_name }}</h4>
    <p class="text-center meta mb-3">If playback does not start, use the direct link button below.</p>

    <div class="video-container">
      <video id="video_player" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div class="text-center mt-3 d-flex flex-wrap gap-2 justify-content-center">
      <a href="{{ direct_download_url }}" class="btn btn-primary" target="_blank" rel="noopener">Direct Download</a>
      <a href="{{ src }}" class="btn btn-outline-light" target="_blank" rel="noopener">Open Stream Link</a>
    </div>
  </div>

  <script src="https://vjs.zencdn.net/8.17.4/video.min.js"></script>
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-ads@6.9.0/dist/videojs-contrib-ads.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/videojs-ima@2.4.0/dist/videojs.ima.umd.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const sourceUrl = {{ src | tojson }};
      const vastTag = {{ vast_ad_tag_url | tojson }};
      const midrollMarkers = {{ midroll_markers | tojson }};
      const postrollEnabled = {{ postroll_enabled | tojson }};

      const player = videojs('video_player', {
        autoplay: false,
        controls: true,
        preload: 'auto',
        fluid: true,
        html5: { vhs: { overrideNative: true } }
      });

      player.src({ src: sourceUrl, type: 'video/mp4' });

      let adInitialized = false;
      const shownMarkers = new Set();

      const requestAd = () => {
        if (!adInitialized || !vastTag) return;
        try {
          player.ima.changeAdTag(vastTag);
          player.ima.requestAds();
        } catch (_) {}
      };

      if (vastTag) {
        player.ima({
          id: 'video_player',
          adTagUrl: vastTag,
          debug: false,
          timeout: 6000
        });

        player.ready(() => {
          try {
            player.ima.initializeAdDisplayContainer();
            adInitialized = true;
          } catch (_) {}
        });

        player.on('aderror', () => {
          if (player.paused()) player.play().catch(() => {});
        });
      }

      player.on('play', () => {
        if (vastTag && adInitialized) requestAd();
      });

      player.on('timeupdate', () => {
        if (!vastTag || !adInitialized || !Array.isArray(midrollMarkers)) return;
        const current = Math.floor(player.currentTime() || 0);
        for (const marker of midrollMarkers) {
          if (!shownMarkers.has(marker) && current >= marker) {
            shownMarkers.add(marker);
            requestAd();
            break;
          }
        }
      });

      if (postrollEnabled) {
        player.on('ended', () => {
          requestAd();
        });
      }
    });
  </script>
</body>
</html>
