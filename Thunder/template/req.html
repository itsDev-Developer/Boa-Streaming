<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ heading }}</title>

<!-- SEO -->
<meta name="description" content="Watch {{ file_name }} in premium streaming quality">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Video.js -->
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/videojs-ima/dist/videojs.ima.css" rel="stylesheet">

<style>

:root{
    --bg:#070707;
    --card:#111111;
    --border:rgba(255,255,255,0.08);
    --text:#ffffff;
    --muted:#9ca3af;
    --primary:#8b5cf6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at top,#18181b 0%,#050505 60%);
    color:var(--text);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
}

/* Background Glow */
body::before{
    content:'';
    position:fixed;
    width:600px;
    height:600px;
    background:rgba(139,92,246,0.12);
    filter:blur(120px);
    top:-200px;
    left:-200px;
    z-index:-1;
}

/* Header */
.topbar{
    position:sticky;
    top:0;
    z-index:1000;
    backdrop-filter:blur(14px);
    background:rgba(0,0,0,0.55);
    border-bottom:1px solid var(--border);
}

.brand{
    font-size:1.2rem;
    font-weight:700;
    color:white;
    text-decoration:none;
}

.container-main{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

/* Title */
.movie-title{
    font-size:1.4rem;
    font-weight:600;
    margin-bottom:16px;
    color:#f3f4f6;
}

/* Player Wrapper */
.player-wrapper{
    position:relative;
    border-radius:20px;
    overflow:hidden;
    background:#000;
    box-shadow:
    0 10px 40px rgba(0,0,0,.7),
    0 0 0 1px rgba(255,255,255,.05);
}

/* VideoJS */
.video-js{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
}

.vjs-control-bar{
    background:linear-gradient(to top,rgba(0,0,0,.85),transparent)!important;
}

.vjs-big-play-button{
    border:none!important;
    width:90px!important;
    height:90px!important;
    border-radius:50%!important;
    background:rgba(139,92,246,.85)!important;
    backdrop-filter:blur(10px);
    transition:.3s;
}

.vjs-big-play-button:hover{
    transform:scale(1.08);
}

/* Ads */
.ad-banner{
    margin:20px 0;
    border-radius:16px;
    overflow:hidden;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    min-height:90px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Buttons */
.action-bar{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:20px;
}

.action-btn{
    border:none;
    padding:12px 20px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    color:white;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:10px;
    transition:.25s;
    border:1px solid rgba(255,255,255,.08);
}

.action-btn:hover{
    background:rgba(139,92,246,.2);
    transform:translateY(-2px);
}

.action-btn.primary{
    background:linear-gradient(135deg,#7c3aed,#8b5cf6);
}

/* Info Cards */
.info-grid{
    margin-top:22px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
}

.info-card{
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.05);
    border-radius:16px;
    padding:18px;
}

.info-title{
    font-size:.9rem;
    color:var(--muted);
    margin-bottom:8px;
}

/* Floating Ad */
.floating-ad{
    position:fixed;
    bottom:18px;
    right:18px;
    width:320px;
    max-width:90%;
    background:#111;
    border-radius:16px;
    overflow:hidden;
    z-index:9999;
    box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.close-ad{
    position:absolute;
    top:8px;
    right:8px;
    width:22px;
    height:22px;
    border-radius:50%;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
    font-size:12px;
}

/* Footer */
footer{
    margin-top:40px;
    padding:20px;
    text-align:center;
    color:#9ca3af;
    border-top:1px solid rgba(255,255,255,.05);
}

/* Mobile */
@media(max-width:768px){

.movie-title{
    font-size:1.1rem;
}

.action-bar{
    flex-direction:column;
}

.action-btn{
    width:100%;
    justify-content:center;
}

.vjs-big-play-button{
    width:70px!important;
    height:70px!important;
}

}

</style>
</head>

<body>

<!-- HEADER -->
<header class="topbar">
<div class="container-main d-flex justify-content-between align-items-center">
<a href="/" class="brand">Thunder Stream</a>
</div>
</header>

<!-- MAIN -->
<div class="container-main">

<!-- TITLE -->
<h1 class="movie-title">{{ file_name }}</h1>

<!-- TOP AD -->
<div class="ad-banner">
    TOP BANNER AD
</div>

<!-- PLAYER -->
<div class="player-wrapper">

<video
id="video_player"
class="video-js vjs-big-play-centered"
controls
preload="auto"
playsinline
muted
poster="https://cdn.jsdelivr.net/gh/fyaz05/Resources@main/FileToLink/logo.png"
data-setup='{}'>

<source src="{{ src }}" type="video/mp4">

</video>

</div>

<!-- BOTTOM AD -->
<div class="ad-banner">
    BOTTOM BANNER AD
</div>

<!-- ACTIONS -->
<div class="action-bar">

<a href="{{ src }}" download="{{ file_name }}" class="action-btn primary">
⬇ Download
</a>

<button class="action-btn" onclick="copyLink()">
🔗 Copy Link
</button>

<a href="vlc://{{ src }}" class="action-btn">
▶ Open VLC
</a>

<a href="intent:{{ src }}#Intent;action=android.intent.action.VIEW;type=video/*;package=com.mxtech.videoplayer.ad;end"
class="action-btn">
📺 MX Player
</a>

</div>

<!-- INFO -->
<div class="info-grid">

<div class="info-card">
<div class="info-title">Streaming Quality</div>
<div>Full HD / Adaptive</div>
</div>

<div class="info-card">
<div class="info-title">Player</div>
<div>Video.js + VAST Ads</div>
</div>

<div class="info-card">
<div class="info-title">Compatibility</div>
<div>Mobile, Desktop, TV</div>
</div>

</div>

</div>

<!-- FLOATING AD -->
<div class="floating-ad" id="floatingAd">
<button class="close-ad" onclick="document.getElementById('floatingAd').remove()">×</button>

<div style="height:250px;display:flex;align-items:center;justify-content:center;">
    STICKY AD
</div>
</div>

<!-- FOOTER -->
<footer>
© <script>document.write(new Date().getFullYear())</script> Thunder Stream
</footer>

<!-- Video.js -->
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<!-- IMA SDK -->
<script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>

<!-- Ads Plugin -->
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-ads/dist/videojs-contrib-ads.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-ima/dist/videojs.ima.min.js"></script>

<script>

const player = videojs('video_player');

/* -------------------------
   VAST AD ROTATION
-------------------------- */

const vastAds = [

'https://windy-imagination.com/dum/F/z.dcGhN/vQZeGRUa/VeYmA9JuFZoUflNkQP/TscDwmM/DsYk5/NHD/EmtkNizbA/w/NNjMk/0_NISHZfsZaoW/1mpTdWD/0Uxg',
'https://windy-imagination.com/dum/F/z.dcGhN/vQZeGRUa/VeYmA9JuFZoUflNkQP/TscDwmM/DsYk5/NHD/EmtkNizbA/w/NNjMk/0_NISHZfsZaoW/1mpTdWD/0Uxg',
'https://windy-imagination.com/dum/F/z.dcGhN/vQZeGRUa/VeYmA9JuFZoUflNkQP/TscDwmM/DsYk5/NHD/EmtkNizbA/w/NNjMk/0_NISHZfsZaoW/1mpTdWD/0Uxg'

];

function randomAd(){
    return vastAds[Math.floor(Math.random()*vastAds.length)];
}

/* -------------------------
   VIDEOJS IMA SETUP
-------------------------- */

player.ima({
    id:'video_player',
    adTagUrl:randomAd(),
    debug:false,
    timeout:5000,
    prerollTimeout:5000
});

player.ready(function(){

    player.ima.initializeAdDisplayContainer();

    /* autoplay muted preview */
    player.muted(true);

    player.play().catch(()=>{});

    player.ima.requestAds();

    /* fallback */
    player.on('aderror',()=>{
        player.play();
    });

    /* midroll */
    player.on('pause',function(){

        if(!player.ima.adIsPlaying()){

            player.ima.changeAdTag(randomAd());
            player.ima.requestAds();

        }

    });

    /* postroll */
    player.on('ended',function(){

        player.ima.changeAdTag(randomAd());
        player.ima.requestAds();

    });

});

/* Copy */
function copyLink(){

navigator.clipboard.writeText(window.location.href);

alert('Link Copied');

}

</script>

</body>
</html>
