<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Download {{ file_name }}</title><style>body{margin:0;font-family:Inter,system-ui;background:#0d1328;color:#e7ecff;display:grid;place-items:center;min-height:100vh} .box{max-width:640px;background:#162043;border:1px solid #2b3e74;border-radius:16px;padding:22px} .btn{display:inline-block;background:#5f8bff;color:#fff;text-decoration:none;padding:11px 16px;border-radius:12px;font-weight:700} .muted{color:#9fb0da}</style></head>
<body><div class='box'><h2>Preparing download</h2><p class='muted'>File: <b>{{ file_name }}</b></p><p id='status' class='muted'>Click continue to open sponsor and start download securely.</p><button class='btn' id='continueBtn'>Continue Download</button></div>
<script>
const dl={{ src|tojson }}, ad={{ direct_download_ad_url|tojson }}, cooldownMs={{ download_ad_cooldown_ms|tojson }}; const key='dl_cooldown_'+btoa(dl).slice(0,16);
function inCooldown(){const t=Number(localStorage.getItem(key)||0);return Date.now()-t<cooldownMs;} function mark(){localStorage.setItem(key,Date.now());}
async function run(){const s=document.getElementById('status'); if(inCooldown()){s.textContent='Cooldown active. Please wait before retrying.'; return;} const w=window.open(ad,'_blank','noopener,noreferrer'); if(!w){s.textContent='Popup blocked. Allow popups and retry.'; return;}
mark(); s.textContent='Ad opened. Starting your download...'; setTimeout(()=>{const a=document.createElement('a');a.href=dl;a.download={{ file_name|tojson }};document.body.appendChild(a);a.click();a.remove();},900);}
document.getElementById('continueBtn').addEventListener('click',run);
</script></body></html>
